<!DOCTYPE html>


<html lang="en">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Portfolio Landing Page</title>
   <link rel="stylesheet" href="style.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
   </head>

   <body>
   <header class="header">
    <nav class="navbar">
      <div class="logo">
        <h2>James</h2>
      </div>
      <ul>
        <li>Home</li>
        <li>About</li>
        <li>Work</li>
        <li>Skills</li>
        <li>Contact</li>
      </ul>
    
    <button class="contact-btn">
      Contact
    </button>
    </nav>
   </header>

   <div class="divider"></div>

   <section class="hero">
    <div class="hero-content">
      
      <h3>Hello, I'M James</h3>
      <h1>I build beautiful <br> web experiences</h1>
      <p>
        I'm front end developer passionate about <br> building modern and responsive websites. 
      </p>
      

      <div class="button">
        <button class="view-btn">View My Work</button>
        <button class="download-btn">Download CV</button>
      </div>

      <div class="icons">
        <i class="fa-brands fa-twitter"></i>
        <i class="fa-brands fa-linkedin"></i>
        <i class="fa-brands fa-github"></i>
      </div>
    
    </div>

    <div class="hero-image">
      <img class="developer-image" src="developer.png" alt="developer">
    </div>
   </section>

   </body>
</html>
